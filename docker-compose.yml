services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]

  dynamodb-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=fake
      - AWS_SECRET_ACCESS_KEY=fake
      - AWS_DEFAULT_REGION=local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for DynamoDB..."
        until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 > /dev/null 2>&1; do
          sleep 1
        done
        echo "Creating Predictions table..."
        aws dynamodb create-table \
          --table-name Predictions \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb:8000
        echo "Done."
    depends_on:
      - dynamodb

model:
    build:
      context: ./container
    ports:
      - "8001:80"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MODEL_SERVICE_URL=http://model:80
      - PREDICTIONS_TABLE=Predictions
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      model:
        condition: service_healthy
  

