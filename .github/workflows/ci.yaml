name: CI pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  typecheck:
    name: Typescript Type Check
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci 
      - run: npx tsc --noEmit -p packages/api/tsconfig.json

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: astral-sh/setup-uv@v5
        with:
          version: latest
      - run: uv tool install ruff
      - run: ruff check container/ ml/ main.py


